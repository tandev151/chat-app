version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: chat_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_app
    expose:
      - "5432"
    ports:
      - "5432:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data

  be:
    build:
      context: ./be
      dockerfile: Dockerfile
    container_name: chat_be
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/chat_app?schema=public
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3002
      - JWT_SECRET_KEY=gM0z0GvQrz5r5I7daFZdsOgmDWNPtHjDUH57aW88gLF
    depends_on:
      - db

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: chat_fe
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXT_PUBLIC_WS_URL=http://localhost:3002
    depends_on:
      - be

volumes:
  chat_postgres_data:
